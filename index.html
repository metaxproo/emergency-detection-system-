<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDS | MASTER COMMAND CENTER</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-bg: #040c18;
            --navy-panel: #0a192f;
            --accent-cyan: #00f3ff;
            --metal-shine: linear-gradient(180deg, #ffffff 0%, #a8abb1 50%, #636b75 100%);
        }

        body { 
            background-color: var(--navy-bg); color: #e0e0e0; font-family: 'Orbitron', sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            background: rgba(10, 25, 47, 0.9); padding: 10px; text-align: center;
            border-bottom: 2px solid #1a3a5a; box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
            flex-shrink: 0;
        }

        .metallic-text {
            background: var(--metal-shine); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; font-weight: 900; letter-spacing: 1px; margin: 0;
        }

        /* حاوية الداشبورد - جنب بعض دائماً */
        .dashboard-container { 
            display: flex; flex-direction: row; flex: 1; padding: 10px; gap: 10px; 
            overflow: hidden; box-sizing: border-box; width: 100%;
        }

        /* الخريطة تاخد مساحة أكبر شوية */
        #map { 
            flex: 0 0 60%; /* 60% من العرض */
            border-radius: 10px; border: 1px solid #1a3a5a; 
            box-shadow: inset 0 0 15px #000; cursor: crosshair;
        }

        /* السايدبار جنبها */
        .sidebar {
            flex: 0 0 40%; /* 40% من العرض */
            background: var(--navy-panel); border-radius: 10px; border: 1px solid #1a3a5a;
            display: flex; flex-direction: column; padding: 10px; overflow-y: auto; 
            box-sizing: border-box; min-width: 0; /* بيمنع السايدبار إنه يزق الخريطة */
        }

        .data-card {
            background: #112240; border-radius: 8px; padding: 10px; margin-bottom: 10px;
            border-left: 3px solid var(--accent-cyan); box-sizing: border-box; word-wrap: break-word;
        }

        .log-list {
            flex-grow: 1; background: #020c1b; border-radius: 5px; padding: 8px;
            font-family: monospace; font-size: 10px; overflow-y: auto; color: #8892b0;
            border: 1px solid #1a3a5a; margin: 5px 0; min-height: 80px; line-height: 1.3;
        }

        .button-group { display: flex; flex-direction: column; gap: 5px; }

        .nav-btn {
            background: rgba(0, 243, 255, 0.05); color: var(--accent-cyan); border: 1px solid var(--accent-cyan);
            padding: 8px; font-family: 'Orbitron'; font-size: 0.6rem; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; border-radius: 4px; width: 100%;
        }

        .nav-btn:hover { background: var(--accent-cyan); color: var(--navy-bg); }

        #toast {
            position: fixed; bottom: 20px; right: 20px; background: #112240; color: var(--accent-cyan);
            padding: 10px; border: 1px solid var(--accent-cyan); border-radius: 5px; display: none; z-index: 1000; font-size: 12px;
        }

        /* تعديلات الموبايل الإضافية لضمان عدم خروج أي نص */
        @media (max-width: 600px) {
            .metallic-text { font-size: 0.8rem; }
            h3.metallic-text { font-size: 0.6rem !important; }
            #alert-type { font-size: 0.65rem !important; }
            #alert-coords { font-size: 0.55rem !important; }
            .dashboard-container { padding: 5px; gap: 5px; }
            .sidebar { padding: 8px; }
            .data-card { padding: 8px; }
        }
    </style>
</head>
<body>

<header><h1 class="metallic-text">EDS | COMMAND INTERFACE</h1></header>

<div class="dashboard-container">
    <div id="map"></div>
    
    <div class="sidebar">
        <h3 class="metallic-text" style="font-size: 0.7rem; margin-bottom: 5px;">System Feed</h3>
        <div class="data-card">
            <div id="alert-id" style="font-size: 9px; color: var(--accent-cyan);">ID: WAITING...</div>
            <h4 id="alert-type" style="color: #ffb347; margin: 4px 0; font-size: 0.8rem;">READY</h4>
            <div id="alert-coords" style="font-size: 0.6rem; color: #8892b0;">Lat: -- | Lng: --</div>
        </div>

        <h3 class="metallic-text" style="font-size: 0.7rem;">Activity Log</h3>
        <div id="log" class="log-list"></div>
        
        <h3 class="metallic-text" style="font-size: 0.7rem; margin-top: 5px;">Dispatch</h3>
        <div class="button-group">
            <button class="nav-btn" onclick="masterDispatch('WEAPON', 'Police')">Police</button>
            <button class="nav-btn" onclick="masterDispatch('FALL', 'Medical')">Ambulance</button>
            <button class="nav-btn" onclick="masterDispatch('FIRE', 'Fire')">Fire</button>
        </div>
    </div>
</div>

<div id="toast"></div>
